<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TgRound Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        /* 1. Har xil rangga o'zgaruvchi jonli fon animatsiyasi */
        body { 
            margin: 0; 
            height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; /* 15 soniyada ranglar almashadi */
            color: #000; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        #reels { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
        }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }
        
        /* 2. Kattalashtirilgan dumaloq video oynasi */
        .video-wrapper {
            position: relative;
            width: 88vw; 
            height: 88vw;
            max-width: 420px;
            max-height: 420px;
            border-radius: 50%;
            overflow: visible; /* Smayllar tashqariga chiqishi uchun */
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            border: 6px solid #fff;
            background: #000;
            z-index: 10;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%;
        }
        
        /* 3. Smayllar animatsiyasi (Tashqarida uchish) */
        .emoji-fly {
            position: absolute;
            font-size: 40px;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            animation: flyAroundOuter 5s ease-in-out infinite;
        }

        @keyframes flyAroundOuter {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translate(var(--tw-x-start), var(--tw-y-start)) scale(1); }
            50% { transform: translate(var(--tw-x-mid), var(--tw-y-mid)) scale(1.3); opacity: 1; }
            80% { opacity: 1; transform: translate(var(--tw-x-end), var(--tw-y-end)) scale(1); }
            100% { transform: translate(0, 0) scale(0); opacity: 0; }
        }
        
        /* Ma'lumotlar pufakchasi */
        .info-bubble {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 12px 20px;
            width: 80%;
            max-width: 380px;
            margin-top: 35px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
        }
        .info-bubble h3 { margin: 0; font-size: 18px; color: #2481cc; cursor: pointer; }
        .info-bubble p { margin: 8px 0 0; font-size: 15px; color: #333; font-weight: 500; }
        
        /* Share tugmasi */
        .side-actions {
            position: absolute;
            right: 20px;
            bottom: 40px;
            z-index: 20;
        }
        .action-btn {
            background: #fff;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // FIREBASE SOZLAMALARI (O'zingiznikini qo'ying)
        const firebaseConfig = { databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allVideos = [];
        const botUsername = "Vireels_bot"; 
        const funEmojis = ['😂', '😍', '🎉', '🔥', '👍', '🙈', '⚡️', '🌟', '🚀', '😎'];

        db.ref('videos').on('value', snap => {
            const data = snap.val() || {};
            let videos = Object.entries(data).map(([id, item]) => ({ id, ...item }));
            videos.reverse(); 
            allVideos = videos;
            renderVideos(allVideos);
        });

        function renderVideos(videos) {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            videos.forEach(item => {
                const div = document.createElement('div');
                div.className = 'reel';
                
                let emojisHtml = '';
                const numEmojis = 10; // Smayllar soni ko'paytirildi

                for (let i = 0; i < numEmojis; i++) {
                    const emoji = funEmojis[Math.floor(Math.random() * funEmojis.length)];
                    const angle = (i / numEmojis) * Math.PI * 2;
                    
                    // Harakat radiusini kengaytirdik (Oynadan tashqari)
                    const rS = 150 + Math.random() * 50; 
                    const rM = 220 + Math.random() * 100;
                    const rE = 180 + Math.random() * 70;

                    emojisHtml += `<div class="emoji-fly" style="
                        --tw-x-start: ${Math.cos(angle)*rS}px; --tw-y-start: ${Math.sin(angle)*rS}px;
                        --tw-x-mid: ${Math.cos(angle+0.4)*rM}px; --tw-y-mid: ${Math.sin(angle+0.4)*rM}px;
                        --tw-x-end: ${Math.cos(angle+0.8)*rE}px; --tw-y-end: ${Math.sin(angle+0.8)*rE}px;
                        animation-duration: ${4 + Math.random()*3}s;
                        animation-delay: ${Math.random()*4}s;
                    ">${emoji}</div>`;
                }

                div.innerHTML = `
                    <div class="video-wrapper" ondblclick="handleDoubleTap(this)">
                        <video id="vid-${item.id}" loop playsinline muted preload="metadata" src="${item.file_url}"></video>
                        ${emojisHtml}
                    </div>
                    
                    <div class="info-bubble">
                        <h3 onclick="tg.openTelegramLink('${item.channel_link}')">@${item.user}</h3>
                        <p>${item.caption || ''}</p>
                    </div>

                    <div class="side-actions">
                        <button class="action-btn" onclick="shareVideo('${item.id}', '${item.caption}')">✈️</button>
                    </div>
                `;
                container.appendChild(div);
            });
            initLazyLoad();
        }

        function initLazyLoad() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play();
                        video.muted = false;
                    } else {
                        video.pause();
                        video.currentTime = 0;
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function shareVideo(id, text) {
            const deepLink = `https://t.me/${botUsername}?start=${id}`;
            const shareUrl = `https://t.me/share/url?url=${deepLink}&text=${encodeURIComponent('🎬 ' + text)}`;
            tg.openTelegramLink(shareUrl);
        }

        function handleDoubleTap(element) {
            const heart = document.createElement('div');
            heart.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:100px;z-index:30;opacity:0;transition:0.4s;pointer-events:none;';
            heart.innerHTML = '❤️';
            element.appendChild(heart);
            setTimeout(() => { heart.style.opacity='1'; heart.style.transform='translate(-50%,-50%) scale(1.3)'; }, 20);
            setTimeout(() => { heart.style.opacity='0'; heart.style.transform='translate(-50%,-50%) scale(1)'; }, 700);
            setTimeout(() => heart.remove(), 1200);
        }
    </script>
</body>
</html>
