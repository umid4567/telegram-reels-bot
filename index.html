<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TgRound Liquid Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        /* Jonli fon */
        body { 
            margin: 0; 
            height: 100vh;
            background: linear-gradient(-45deg, #2c3e50, #4ca1af, #2c3e50, #000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        #reels { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
        }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }
        
        /* Video wrapper */
        .video-wrapper {
            position: relative;
            width: 85vw; 
            height: 85vw;
            max-width: 400px;
            max-height: 400px;
            border-radius: 50%;
            overflow: visible; 
            box-shadow: 0 0 50px rgba(255,255,255,0.1);
            border: 4px solid rgba(255,255,255,0.8);
            background: #000;
            z-index: 20;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%;
            position: relative;
            z-index: 25;
        }

        /* Suyuq metall tomchilari (Blob elementlar) */
        .blob {
            position: absolute;
            background: linear-gradient(135deg, #e6e6e6 0%, #ffffff 50%, #a6a6a6 100%);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 5px 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
            filter: blur(1px);
            /* Suyuq shakl berish uchun */
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        }

        /* Ma'lumotlar */
        .info-bubble {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 15px 25px;
            width: 75%;
            max-width: 350px;
            margin-top: 40px;
            text-align: center;
            z-index: 30;
        }
        .info-bubble h3 { margin: 0; font-size: 18px; color: #fff; cursor: pointer; }
        .info-bubble p { margin: 8px 0 0; font-size: 14px; color: #ccc; }
        
        .side-actions {
            position: absolute;
            right: 20px;
            bottom: 40px;
            z-index: 40;
        }
        .action-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = { databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allVideos = [];
        const botUsername = "Vireels_bot"; 

        db.ref('videos').on('value', snap => {
            const data = snap.val() || {};
            let videos = Object.entries(data).map(([id, item]) => ({ id, ...item }));
            videos.reverse(); 
            allVideos = videos;
            renderVideos(allVideos);
        });

        function renderVideos(videos) {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            videos.forEach(item => {
                const div = document.createElement('div');
                div.className = 'reel';
                
                // Metall tomchilarini yaratish
                let blobsHtml = '';
                const numBlobs = 6; // 6 ta asosiy tomchi

                for (let i = 0; i < numBlobs; i++) {
                    const angle = (i / numBlobs) * Math.PI * 2;
                    const size = 60 + Math.random() * 80; // Har xil hajm
                    const dist = 160 + Math.random() * 40; // Masofa
                    
                    // Har bir tomchi uchun tasodifiy suyuq shakl
                    const r1 = 30 + Math.random() * 40;
                    const r2 = 30 + Math.random() * 40;
                    const r3 = 30 + Math.random() * 40;
                    const r4 = 30 + Math.random() * 40;

                    blobsHtml += `<div class="blob" style="
                        width: ${size}px; height: ${size}px;
                        left: calc(50% + ${Math.cos(angle)*dist}px - ${size/2}px);
                        top: calc(50% + ${Math.sin(angle)*dist}px - ${size/2}px);
                        border-radius: ${r1}% ${100-r1}% ${r2}% ${100-r2}% / ${r3}% ${r4}% ${100-r4}% ${100-r3}%;
                        transform: rotate(${Math.random()*360}deg);
                    "></div>`;
                }

                div.innerHTML = `
                    <div class="video-wrapper" ondblclick="handleDoubleTap(this)">
                        <video id="vid-${item.id}" loop playsinline muted preload="metadata" src="${item.file_url}"></video>
                        ${blobsHtml}
                    </div>
                    
                    <div class="info-bubble">
                        <h3 onclick="tg.openTelegramLink('${item.channel_link}')">@${item.user}</h3>
                        <p>${item.caption || ''}</p>
                    </div>

                    <div class="side-actions">
                        <button class="action-btn" onclick="shareVideo('${item.id}', '${item.caption}')">✈️</button>
                    </div>
                `;
                container.appendChild(div);
            });
            initLazyLoad();
        }

        function initLazyLoad() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play();
                        video.muted = false;
                    } else {
                        video.pause();
                        video.currentTime = 0;
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function shareVideo(id, text) {
            const deepLink = `https://t.me/${botUsername}?start=${id}`;
            const shareUrl = `https://t.me/share/url?url=${deepLink}&text=${encodeURIComponent('🎬 ' + text)}`;
            tg.openTelegramLink(shareUrl);
        }

        function handleDoubleTap(element) {
            const heart = document.createElement('div');
            heart.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:100px;z-index:50;color:#fff;opacity:0;transition:0.4s;pointer-events:none;text-shadow:0 0 20px #fff;';
            heart.innerHTML = '🤍';
            element.appendChild(heart);
            setTimeout(() => { heart.style.opacity='1'; heart.style.transform='translate(-50%,-50%) scale(1.3)'; }, 20);
            setTimeout(() => { heart.style.opacity='0'; heart.style.transform='translate(-50%,-50%) scale(1)'; }, 700);
            setTimeout(() => heart.remove(), 1200);
        }
    </script>
</body>
</html>
