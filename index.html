<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels - Mini App</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
        }
        #reels { 
            height: 100vh; 
            width: 100vw; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; /* Firefox uchun */
        }
        #reels::-webkit-scrollbar { display: none; } /* Chrome/Safari uchun */

        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Videoni ekranga to'liq yoyish */
        }
        .info {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 15px;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .info h3 { margin: 0; font-size: 18px; color: #fff; }
        .info p { margin: 5px 0 0; font-size: 14px; color: #ddd; }

        .status-msg { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            width: 80%; 
            z-index: 100;
            color: #888;
        }
        
        /* Video yuklanish vaqtidagi animatsiya */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="reels">
        <div class="status-msg" id="status">
            <div class="loading-spinner"></div>
            <br>Baza bilan aloqa o'rnatilmoqda...
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const status = document.getElementById('status');
            const reelsContainer = document.getElementById('reels');

            // Bazadan ma'lumotlarni o'qish
            database.ref('videos').on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    status.innerHTML = "<b>Hali videolar yo'q.</b><br><br>Botga videoning .mp4 linkini yuboring!";
                    return;
                }

                reelsContainer.innerHTML = ''; // Ekranni tozalash
                
                Object.values(data).reverse().forEach(item => {
                    if (item.url && String(item.url).startsWith('http')) {
                        const reelDiv = document.createElement('div');
                        reelDiv.className = 'reel';
                        
                        reelDiv.innerHTML = `
                            <video src="${item.url}" 
                                   loop 
                                   playsinline 
                                   autoplay 
                                   muted 
                                   preload="auto"
                                   onclick="this.muted = !this.muted; this.play()">
                            </video>
                            <div class="info">
                                <h3>@${item.user || 'foydalanuvchi'}</h3>
                                <p>${item.caption || ''}</p>
                            </div>
                        `;
                        reelsContainer.appendChild(reelDiv);
                    }
                });

                // Agar videolar bo'lsa, xabarni o'chirish
                if(reelsContainer.children.length > 0) {
                    status.style.display = 'none';
                } else {
                    status.innerHTML = "To'g'ri formatdagi videolar topilmadi (.mp4 link kerak)";
                }
            }, (error) => {
                status.innerHTML = "Firebase xatosi: " + error.message;
            });

        } catch (e) {
            document.getElementById('status').innerHTML = "Tizim xatosi: " + e.message;
        }
    </script>
</body>
</html>
