<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh;
            /* MUHIM: Yagona va o'zgarmas fon rasmi */
            background-image: url('https://w0.peakpx.com/wallpaper/424/67/wallpaper-outer-space-planets-galaxies-4k.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Fon rasmini qotirish */
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }
        
        #reels { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
        }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            display: flex; 
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 80vw; 
            height: 80vw;
            max-width: 400px;
            max-height: 400px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
            border: 5px solid #fff;
            background: #000;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .info-panel h3 { margin: 0; color: #ffca28; font-size: 18px; }
        .info-panel p { margin: 5px 0 0; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="reels">
        <div class="reel">
            <div class="video-wrapper">
                <video loop playsinline muted autoplay src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
            </div>
            <div class="info-panel">
                <h3>@Kattakurgan_Life</h3>
                <p>Kattakurgan ko'chalari!</p>
            </div>
        </div>

        <div class="reel">
            <div class="video-wrapper">
                <video loop playsinline muted src="https://www.w3schools.com/html/movie.mp4"></video>
            </div>
            <div class="info-panel">
                <h3>@UzReels</h3>
                <p>Ajoyib tabiat manzarasi.</p>
            </div>
        </div>
    </div>

    <script>
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play();
                } else {
                    video.pause();
                    video.currentTime = 0;
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
    </script>
</body>
</html>
