<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels Memory</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #reels { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
        }
        #reels::-webkit-scrollbar { display: none; }
        .reel { 
            height: 100vh; width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info {
            position: absolute; bottom: 40px; left: 15px; right: 15px;
            z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="reels"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const reelsContainer = document.getElementById('reels');

        database.ref('videos').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            reelsContainer.innerHTML = '';
            // Videolarni ID bilan birga saqlaymiz
            const videoEntries = Object.entries(data).reverse();

            videoEntries.forEach(([id, item]) => {
                if (item.url && String(item.url).startsWith('http')) {
                    const reelDiv = document.createElement('div');
                    reelDiv.className = 'reel';
                    reelDiv.dataset.id = id; // Har bir videoga ID biriktiramiz
                    reelDiv.innerHTML = `
                        <video src="${item.url}" loop playsinline muted preload="auto"></video>
                        <div class="info">
                            <h3>@${item.user || 'foydalanuvchi'}</h3>
                            <p>${item.caption || ''}</p>
                        </div>
                    `;
                    reelsContainer.appendChild(reelDiv);
                }
            });

            setupObserver();
            scrollToLastVideo(); // Oxirgi ko'rilgan videoga sakrash
        });

        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play();
                        // Ko'rilayotgan video ID-sini xotiraga saqlash
                        const videoId = video.parentElement.dataset.id;
                        localStorage.setItem('last_video_id', videoId);
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('video').forEach(v => observer.observe(v));
        }

        function scrollToLastVideo() {
            const lastId = localStorage.getItem('last_video_id');
            if (lastId) {
                const lastElement = document.querySelector(`[data-id="${lastId}"]`);
                if (lastElement) {
                    lastElement.scrollIntoView();
                }
            }
        }

        // Birinchi teginishda ovozni yoqish
        document.body.onclick = () => {
            document.querySelectorAll('video').forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.top < window.innerHeight) {
                    v.muted = false;
                    v.play();
                }
            });
        };
    </script>
</body>
</html>
