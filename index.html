<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels Shorts</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .cat-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; gap: 10px; padding: 15px; overflow-x: auto; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-item { background: rgba(255,255,255,0.2); padding: 7px 15px; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .cat-item.active { background: #ff2d55; font-weight: bold; }
        
        #reels { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .content-wrapper { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; transform: scale(1.05); }

        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .btn svg { width: 35px; height: 35px; fill: white; filter: drop-shadow(1px 1px 2px #000); }
        .liked svg { fill: #ff2d55; }
        
        .info { position: absolute; bottom: 30px; left: 15px; right: 80px; z-index: 10; pointer-events: none; }
        .info h3 { margin: 0; font-size: 16px; color: #3498db; }
        .info p { font-size: 14px; margin: 5px 0; opacity: 0.9; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

    <div class="cat-bar">
        <div class="cat-item active" onclick="setCat('Hammasi')">Hammasi</div>
        <div class="cat-item" onclick="setCat('Futbol')">Futbol</div>
        <div class="cat-item" onclick="setCat('Qiziqarli')">Qiziqarli</div>
        <div class="cat-item" onclick="setCat('Texno')">Texno</div>
        <div class="cat-item" onclick="setCat('Boshqa')">Boshqa</div>
    </div>

    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id || "guest";
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentCat = "Hammasi";
        let renderedIds = new Set();

        function setCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-item').forEach(el => el.classList.toggle('active', el.innerText === cat));
            renderedIds.clear();
            document.getElementById('reels').innerHTML = '';
            loadData();
        }

        function loadData() {
            db.ref('videos').on('value', snap => {
                const data = snap.val() || {};
                const entries = Object.entries(data).reverse();
                const container = document.getElementById('reels');

                entries.forEach(([id, item]) => {
                    if (currentCat !== "Hammasi" && item.category !== currentCat) return;

                    const likes = item.likes ? Object.keys(item.likes).length : 0;
                    const isLiked = item.likes && item.likes[userId];

                    if (!renderedIds.has(id)) {
                        const div = document.createElement('div');
                        div.className = 'reel';
                        div.id = `reel-${id}`;
                        div.innerHTML = `
                            <div class="content-wrapper">
                                <iframe src="${item.url}" allow="autoplay; encrypted-media"></iframe>
                            </div>
                            <div class="side-bar">
                                <button class="btn ${isLiked ? 'liked' : ''}" id="like-btn-${id}" onclick="like('${id}')">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                    <span id="like-count-${id}">${likes}</span>
                                </button>
                                <button class="btn" onclick="shareVideo('${id}')">
                                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                                </button>
                            </div>
                            <div class="info"><h3>@${item.user}</h3><p>${item.caption || ''}</p></div>
                        `;
                        container.appendChild(div);
                        renderedIds.add(id);
                    } else {
                        // Faqat like qismini yangilash, iframe o'ziga tegmaslik
                        const btn = document.getElementById(`like-btn-${id}`);
                        const count = document.getElementById(`like-count-${id}`);
                        if(btn) btn.classList.toggle('liked', !!isLiked);
                        if(count) count.innerText = likes;
                    }
                });
            });
        }

        function like(id) {
            const ref = db.ref(`videos/${id}/likes/${userId}`);
            ref.once('value', s => s.exists() ? ref.remove() : ref.set(true));
        }

        function shareVideo(id) {
            const link = `https://t.me/uzreels_official_bot?start=${id}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=UzReels-da Shorts ko'ring! 🔥`);
        }

        loadData();
    </script>
</body>
</html>
