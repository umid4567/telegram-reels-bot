<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #reels { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
        }
        #reels::-webkit-scrollbar { display: none; }
        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            background: #000;
            display: flex;
            align-items: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info {
            position: absolute; bottom: 40px; left: 15px; right: 15px;
            z-index: 10; text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
        }
        .info h3 { margin: 0; font-size: 16px; }
        .status-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; }
    </style>
</head>
<body>

    <div id="reels">
        <div class="status-msg" id="status">Videolar yuklanmoqda...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const reelsContainer = document.getElementById('reels');
        const status = document.getElementById('status');

        database.ref('videos').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                status.innerHTML = "Hali videolar yo'q.";
                return;
            }

            reelsContainer.innerHTML = '';
            Object.values(data).reverse().forEach((item, index) => {
                if (item.url && String(item.url).startsWith('http')) {
                    const div = document.createElement('div');
                    div.className = 'reel';
                    div.innerHTML = `
                        <video src="${item.url}" loop playsinline muted></video>
                        <div class="info">
                            <h3>@${item.user || 'admin'}</h3>
                            <p>${item.caption || ''}</p>
                        </div>
                    `;
                    reelsContainer.appendChild(div);
                }
            });
            status.style.display = 'none';
            initVideoLogic(); // Videolarni boshqarish funksiyasini yoqish
        });

        function initVideoLogic() {
            const videos = document.querySelectorAll('video');
            
            // Foydalanuvchi ekranga birinchi marta tekkanda ovozni yoqishga ruxsat berish
            document.body.onclick = () => {
                videos.forEach(v => {
                    if (isElementInViewport(v)) {
                        v.muted = false;
                        v.play().catch(e => console.log("Play error:", e));
                    }
                });
            };

            // Scroll bo'lganda ishlaydigan mantiq
            reelsContainer.onscroll = () => {
                videos.forEach(video => {
                    if (isElementInViewport(video)) {
                        video.play();
                        // Video ekranda bo'lsa ovozi chiqadi (agar foydalanuvchi ruxsat bergan bo'lsa)
                    } else {
                        video.pause();
                        video.currentTime = 0; // Videoni boshiga qaytaradi (xotirani tejash uchun)
                    }
                });
            };
        }

        // Element ekranda ko'rinib turganini tekshirish funksiyasi
        function isElementInViewport(el) {
            const rect = el.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight)
            );
        }
    </script>
</body>
</html>
