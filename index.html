<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels: 3D Chain Cube</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh;
            background: #000;
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }
        
        /* 1. Asosiy 3D Sahnasi */
        #reels { 
            height: 100vh; 
            width: 100vw;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            perspective: 2000px; /* Chuqur 3D effekt */
        }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            /* 3D aylanish markazi */
            transform-style: preserve-3d;
        }

        /* 2. To'liq Ekranli Video Bloki */
        .video-card {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background: #000;
            /* O'girilish nuqtasi - o'rtadan */
            transform-origin: center center -50vh; 
            transition: transform 0.5s ease-out;
            backface-visibility: hidden;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* To'liq fonni qoplaydi */
        }

        /* 3. Premium Ma'lumotlar (Video ustida) */
        .overlay-info {
            position: absolute;
            bottom: 50px;
            left: 20px;
            right: 70px;
            z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            border-radius: 0 0 20px 20px;
            color: white;
        }

        .overlay-info h3 { margin: 0; font-size: 22px; color: #4facfe; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .overlay-info p { margin: 8px 0 0; font-size: 15px; opacity: 0.9; }

        /* Yon tarafdagi Premium Tugmalar */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }

        .action-btn {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 4. Telegram Premium yaltirash effekti (Overlay) */
        .premium-shimmer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            background-size: 200% 200%;
            pointer-events: none;
            animation: shimmerMove 6s infinite;
            z-index: 5;
        }

        @keyframes shimmerMove {
            0% { background-position: -200% -200%; }
            100% { background-position: 200% 200%; }
        }
    </style>
</head>
<body>
    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = { databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const data = snap.val() || {};
            let videos = Object.entries(data).map(([id, item]) => ({ id, ...item })).reverse();
            renderVideos(videos);
        });

        function renderVideos(videos) {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            videos.forEach(item => {
                const div = document.createElement('div');
                div.className = 'reel';
                
                div.innerHTML = `
                    <div class="video-card" ondblclick="handleDoubleTap(this)">
                        <div class="premium-shimmer"></div>
                        <video id="vid-${item.id}" loop playsinline muted preload="none" data-src="${item.file_url}"></video>
                        <div class="overlay-info">
                            <h3 onclick="tg.openTelegramLink('${item.channel_link || '#'}')">💎 @${item.user}</h3>
                            <p>${item.caption || ''}</p>
                        </div>
                        <div class="side-actions">
                            <div class="action-btn" onclick="shareVideo('${item.id}', '${item.caption}')">✈️</div>
                            <div class="action-btn">💙</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            initLazyLoad();
        }

        // 3D KUB/ZANJIR AYLANISHI (Scroll event)
        document.getElementById('reels').addEventListener('scroll', function() {
            const reels = document.querySelectorAll('.reel');
            const scrollPos = this.scrollTop;
            const height = window.innerHeight;

            reels.forEach((reel, index) => {
                const card = reel.querySelector('.video-card');
                const rect = reel.getBoundingClientRect();
                
                // Markazdan qanchalik uzoqligini aniqlaymiz (-1 dan 1 gacha)
                const offset = rect.top / height;
                
                // Kub aylanma effekti: 90 daraja o'girilish
                const rotateX = offset * 90; 
                // Zanjir kabi bir-biriga bog'liq harakat
                const translateZ = Math.abs(offset) * -100; 

                if (card) {
                    card.style.transform = `rotateX(${rotateX}deg) translateZ(${translateZ}px)`;
                    card.style.opacity = 1 - Math.abs(offset) * 0.5;
                }
            });
        });

        function initLazyLoad() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        if (!video.src) {
                            video.src = video.getAttribute('data-src');
                            video.load();
                        }
                        video.play();
                        video.muted = false;
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.5 });
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function shareVideo(id, text) {
            const url = `https://t.me/Vireels_bot?start=${id}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${url}&text=${encodeURIComponent(text)}`);
        }

        function handleDoubleTap(element) {
            const heart = document.createElement('div');
            heart.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;z-index:30;color:#fff;opacity:0;transition:0.4s;pointer-events:none;text-shadow:0 0 30px #4facfe;';
            heart.innerHTML = '💙';
            element.appendChild(heart);
            setTimeout(() => { heart.style.opacity='1'; heart.style.transform='translate(-50%,-50%) scale(1.4)'; }, 20);
            setTimeout(() => { heart.style.opacity='0'; heart.style.transform='translate(-50%,-50%) scale(1)'; }, 700);
            setTimeout(() => heart.remove(), 1000);
        }
    </script>
</body>
</html>
