<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #reels { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .msg { padding: 20px; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <div id="reels">
        <div class="msg" id="status">Baza bilan aloqa o'rnatilmoqda...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const status = document.getElementById('status');
            const reels = document.getElementById('reels');

            // Bazadan ma'lumotni olishga urinish
            database.ref('videos').on('value', (snapshot) => {
                const data = snapshot.val();
                console.log("Ma'lumot:", data);

                if (!data) {
                    status.innerHTML = "Baza topildi, lekin ichi bo'sh. <br> Botga .mp4 link yuboring!";
                    return;
                }

                reels.innerHTML = '';
                Object.values(data).reverse().forEach(item => {
                    if (item.url) {
                        const div = document.createElement('div');
                        div.className = 'reel';
                        div.innerHTML = `<video src="${item.url}" loop playsinline autoplay muted onclick="this.muted=false; this.play()"></video>`;
                        reels.appendChild(div);
                    }
                });
            }, (error) => {
                status.innerHTML = "Firebase xatosi: " + error.message;
            });

        } catch (e) {
            document.getElementById('status').innerHTML = "Kodda xato: " + e.message;
        }
    </script>
</body>
</html>
