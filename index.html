<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels - Uzun va Sifatli</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        /* Asosiy dizayn */
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        #reels { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        #reels::-webkit-scrollbar { display: none; }

        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2;
        }

        /* Yuklanish animatsiyasi (Sust ishlashini bildirmaslik uchun) */
        .loader {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ma'lumotlar qismi */
        .info { 
            position: absolute; 
            bottom: 50px; 
            left: 15px; 
            z-index: 10; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.9); 
            pointer-events: none;
        }
        .info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #fff; }
        .info p { margin: 0; font-size: 0.9rem; color: #ddd; }

        .overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 5; 
            background: linear-gradient(to bottom, transparent 70%, rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>
    <div id="reels"></div>

    <script>
        // WebApp-ni kengaytirish
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ma'lumotlarni olish
        db.ref('videos').on('value', snap => {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            const data = snap.val() || {};
            
            Object.entries(data).reverse().forEach(([id, item]) => {
                const div = document.createElement('div');
                div.className = 'reel';
                // unique ID orqali loader-ni boshqarish
                const videoId = `video-${id}`;
                const loaderId = `loader-${id}`;

                div.innerHTML = `
                    <div class="loader" id="${loaderId}"></div>
                    <video 
                        id="${videoId}"
                        loop 
                        playsinline 
                        muted 
                        autoplay 
                        preload="metadata"
                        src="${item.file_url}"
                        onplaying="document.getElementById('${loaderId}').style.display='none'"
                    ></video>
                    <div class="overlay"></div>
                    <div class="info">
                        <h3>@${item.user}</h3>
                        <p>${item.caption || ''}</p>
                    </div>
                `;
                container.appendChild(div);
            });
            initObserver();
        });

        // Ovozni yoqish (birinchi teginishda)
        document.body.onclick = () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        };

        // Faqat ko'rinayotgan videoni qo'yish (Sustlikni oldini oladi)
        function initObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        v.play().catch(() => {});
                    } else {
                        v.pause();
                    }
                });
            }, { threshold: 0.7 });

            document.querySelectorAll('.reel').forEach(r => observer.observe(r));
        }
    </script>
</body>
</html>
