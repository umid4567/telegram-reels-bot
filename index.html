<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }
        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox */
        }
        .reels-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        
        .reel {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-info {
            position: absolute;
            bottom: 40px;
            left: 15px;
            right: 70px;
            z-index: 10;
            text-shadow: 1px 1px 10px rgba(0,0,0,0.9);
        }
        .video-info h3 { margin: 0; font-size: 16px; color: #fff; }
        .video-info p { margin: 5px 0 0; font-size: 14px; opacity: 0.8; }
        
        .status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reels">
        <div class="status-msg">Yuklanmoqda...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const reelsContainer = document.getElementById('reels');

        // Bazadan ma'lumot olish
        database.ref('videos').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                reelsContainer.innerHTML = '<div class="status-msg">Hali videolar yo‘q. Botga .mp4 link yuboring!</div>';
                return;
            }

            reelsContainer.innerHTML = '';
            Object.values(data).reverse().forEach(item => {
                if (item.url && item.url.startsWith('http')) {
                    const reelDiv = document.createElement('div');
                    reelDiv.className = 'reel';
                    // muted va autoplay qo'shildi, bosganda ovoz chiqadi
                    reelDiv.innerHTML = `
                        <video src="${item.url}" loop playsinline autoplay muted 
                               onclick="this.muted = !this.muted; this.paused ? this.play() : null">
                        </video>
                        <div class="video-info">
                            <h3>@${item.user || 'admin'}</h3>
                            <p>${item.caption || ''}</p>
                        </div>
                    `;
                    reelsContainer.appendChild(reelDiv);
                }
            });
        }, (error) => {
            reelsContainer.innerHTML = `<div class="status-msg">Xatolik: ${error.message}</div>`;
        });

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
