<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TgRound Galaxy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh;
            background: #000;
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }

        /* 1. Global Kosmos Qatlami (Hamma narsaning orqasida) */
        #universe {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Videolardan pastda */
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .planet {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 2;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(0,212,255,0.2));
            animation: floatGlobal 40s linear infinite; /* BUTUN EKRAN BO'YLAB SUZISH */
        }

        @keyframes floatGlobal {
            from { transform: translate(var(--start-x), var(--start-y)) rotate(0deg); }
            to { transform: translate(var(--end-x), var(--end-y)) rotate(360deg); }
        }

        /* 2. Videolar qatlami */
        #reels { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            position: relative;
            z-index: 10; /* Sayyoralardan baland */
        }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            background: transparent;
        }
        
        .video-wrapper {
            position: relative;
            width: 85vw; 
            height: 85vw;
            max-width: 400px;
            max-height: 400px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,212,255,0.4);
            border: 5px solid #fff;
            background: #000;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%;
        }

        .info-bubble {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 12px 20px;
            width: 80%;
            max-width: 380px;
            margin-top: 30px;
            text-align: center;
        }
        .info-bubble h3 { margin: 0; color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        
        .side-actions {
            position: absolute;
            right: 20px;
            bottom: 40px;
        }
        .action-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            width: 55px; height: 55px; border-radius: 50%;
            font-size: 26px; color: #fff;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="universe"></div>

    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = { databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Kosmosni yaratish (Yulduzlar va Sayyoralar)
        const universe = document.getElementById('universe');
        const planetImgs = [
            'https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Nasa_blue_marble.png/640px-Nasa_blue_marble.png',
            'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Full_Moon_Luc Viatour.jpg/640px-Full_Moon_Luc Viatour.jpg',
            'https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Mars_Valles_Marineris.jpeg/640px-Mars_Valles_Marineris.jpeg',
            'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Earth_Eastern_Hemisphere.jpg/640px-Earth_Eastern_Hemisphere.jpg'
        ];

        // 50 ta yulduz qo'shish
        for(let i=0; i<50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            universe.appendChild(star);
        }

        // 4 ta suzuvchi sayyora yaratish
        function createPlanet() {
            const planet = document.createElement('div');
            planet.className = 'planet';
            const img = planetImgs[Math.floor(Math.random() * planetImgs.length)];
            const size = 100 + Math.random() * 150;
            
            // Tasodifiy boshlanish va tugash nuqtalari (ekrandan tashqarida)
            const startX = Math.random() > 0.5 ? -200 : window.innerWidth + 200;
            const startY = Math.random() * window.innerHeight;
            const endX = startX < 0 ? window.innerWidth + 200 : -200;
            const endY = Math.random() * window.innerHeight;

            planet.style.backgroundImage = `url('${img}')`;
            planet.style.width = size + 'px';
            planet.style.height = size + 'px';
            planet.style.setProperty('--start-x', startX + 'px');
            planet.style.setProperty('--start-y', startY + 'px');
            planet.style.setProperty('--end-x', endX + 'px');
            planet.style.setProperty('--end-y', endY + 'px');
            planet.style.animationDuration = (30 + Math.random() * 30) + 's';

            universe.appendChild(planet);
            // Sayyora ekrandan o'tib bo'lgach, uni o'chirib yangisini yaratish
            setTimeout(() => {
                planet.remove();
                createPlanet();
            }, 60000);
        }

        for(let i=0; i<4; i++) setTimeout(createPlanet, i * 5000);

        // 2. Videolarni yuklash
        db.ref('videos').on('value', snap => {
            const data = snap.val() || {};
            let videos = Object.entries(data).map(([id, item]) => ({ id, ...item }));
            videos.reverse(); 
            renderVideos(videos);
        });

        function renderVideos(videos) {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            videos.forEach(item => {
                const div = document.createElement('div');
                div.className = 'reel';
                div.innerHTML = `
                    <div class="video-wrapper" ondblclick="handleDoubleTap(this)">
                        <video id="vid-${item.id}" loop playsinline muted preload="metadata" src="${item.file_url}"></video>
                    </div>
                    <div class="info-bubble">
                        <h3 onclick="tg.openTelegramLink('${item.channel_link}')">@${item.user}</h3>
                        <p>${item.caption || ''}</p>
                    </div>
                    <div class="side-actions">
                        <button class="action-btn" onclick="shareVideo('${item.id}', '${item.caption}')">✈️</button>
                    </div>
                `;
                container.appendChild(div);
            });
            initLazyLoad();
        }

        function initLazyLoad() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play(); video.muted = false;
                    } else {
                        video.pause(); video.currentTime = 0;
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function shareVideo(id, text) {
            const deepLink = `https://t.me/Vireels_bot?start=${id}`;
            const shareUrl = `https://t.me/share/url?url=${deepLink}&text=${encodeURIComponent('🎬 ' + text)}`;
            tg.openTelegramLink(shareUrl);
        }

        function handleDoubleTap(element) {
            const heart = document.createElement('div');
            heart.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;z-index:60;color:#00d4ff;opacity:0;transition:0.4s;pointer-events:none;text-shadow:0 0 20px #00d4ff;';
            heart.innerHTML = '💙';
            element.appendChild(heart);
            setTimeout(() => { heart.style.opacity='1'; heart.style.transform='translate(-50%,-50%) scale(1.3)'; }, 20);
            setTimeout(() => { heart.style.opacity='0'; heart.style.transform='translate(-50%,-50%) scale(1)'; }, 700);
            setTimeout(() => heart.remove(), 1200);
        }
    </script>
</body>
</html>
