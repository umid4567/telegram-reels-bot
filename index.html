<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        #category-bar { position: absolute; top: 10px; left: 0; width: 100%; z-index: 100; display: flex; overflow-x: auto; padding: 10px; gap: 10px; scrollbar-width: none; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .cat-btn { background: rgba(255, 255, 255, 0.2); border: none; color: #fff; padding: 7px 16px; border-radius: 20px; white-space: nowrap; font-size: 14px; transition: 0.3s; }
        .cat-btn.active { background: #fff; color: #000; font-weight: bold; }
        #reels { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #reels::-webkit-scrollbar { display: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .side-bar { position: absolute; right: 12px; bottom: 100px; z-index: 20; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .side-icon { background: none; border: none; color: #fff; font-size: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); cursor: pointer; }
        .info { position: absolute; bottom: 30px; left: 15px; right: 70px; z-index: 20; pointer-events: none; }
        .info h3 { margin: 0; font-size: 16px; pointer-events: auto; display: inline-block; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 10px; color: #3498db; }
        .info p { margin: 10px 0; font-size: 14px; text-shadow: 1px 1px 3px #000; }
        .loader { position: absolute; width: 45px; height: 45px; border: 4px solid #222; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="category-bar">
        <button class="cat-btn active" onclick="filterCat('Hammasi', this)">Hammasi</button>
        <button class="cat-btn" onclick="filterCat('Yangiliklar', this)">Yangiliklar</button>
        <button class="cat-btn" onclick="filterCat('Yumor', this)">Yumor</button>
        <button class="cat-btn" onclick="filterCat('Talim', this)">Ta'lim</button>
        <button class="cat-btn" onclick="filterCat('Texno', this)">Texno</button>
    </div>
    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = { databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allVideos = [];
        const botUsername = "Vireels_bot"; // Username-ni bu yerda o'zgartiring

        db.ref('videos').on('value', snap => {
            const data = snap.val() || {};
            let videos = Object.entries(data).map(([id, item]) => ({ id, ...item }));
            
            const urlParams = new URLSearchParams(window.location.search);
            const startId = urlParams.get('start');

            if (startId) {
                const shared = videos.find(v => v.id === startId);
                if (shared) videos = [shared, ...videos.filter(v => v.id !== startId)];
            } else {
                videos.reverse();
            }
            allVideos = videos;
            renderVideos(allVideos);
        });

        function renderVideos(videos) {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            videos.forEach(item => {
                const div = document.createElement('div');
                div.className = 'reel';
                div.innerHTML = `
                    <div class="loader" id="loader-${item.id}"></div>
                    <video id="vid-${item.id}" loop playsinline muted preload="none" src="${item.file_url}" onplaying="document.getElementById('loader-${item.id}').style.display='none'"></video>
                    <div class="side-bar">
                        <button class="side-icon" onclick="this.innerHTML = this.innerHTML === '🤍' ? '❤️' : '🤍'">🤍</button>
                        <button class="side-icon" onclick="shareVideo('${item.id}', '${item.caption}')">✈️</button>
                    </div>
                    <div class="info">
                        <h3 onclick="tg.openTelegramLink('${item.channel_link}')">@${item.user}</h3>
                        <p>${item.caption || ''}</p>
                    </div>
                `;
                container.appendChild(div);
            });
            initLazyLoad();
        }

        function initLazyLoad() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play();
                        video.muted = false;
                    } else {
                        video.pause();
                        video.currentTime = 0; // Resursni tejash uchun
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function shareVideo(id, text) {
            const deepLink = `https://t.me/${botUsername}?start=${id}`;
            const shareUrl = `https://t.me/share/url?url=${deepLink}&text=${encodeURIComponent('🎬 ' + text)}`;
            tg.openTelegramLink(shareUrl);
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderVideos(cat === 'Hammasi' ? allVideos : allVideos.filter(v => v.category === cat.toLowerCase()));
        }
    </script>
</body>
</html>
