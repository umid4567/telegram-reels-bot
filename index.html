<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels: 3D Flip Fullscreen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        /* 1. Premium Osmon Foni */
        body { 
            margin: 0; 
            height: 100vh;
            background: linear-gradient(-45deg, #0088cc, #4facfe, #00f2fe, #a8edea);
            background-size: 400% 400%;
            animation: skyGradient 15s ease infinite;
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
            perspective: 1500px; /* 3D effekt chuqurligi */
        }

        @keyframes skyGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 2. 3D Konteyner */
        #reels { 
            height: 100vh; 
            width: 100vw;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
        }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            /* O'girilish effekti uchun transform-style */
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 3. To'liq Ekranli Video Paneli */
        .video-card {
            width: 92vw;
            height: 85vh;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
            /* O'girilish animatsiyasi siri */
            transform-origin: center bottom;
        }

        /* Skroll qilganda orqaga qayrilish effekti */
        .reel {
            perspective: 1000px;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* 4. Premium Ma'lumotlar (Video ustida) */
        .overlay-info {
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border-left: 5px solid #0088cc;
        }

        .overlay-info h3 { margin: 0; font-size: 20px; color: #fff; }
        .overlay-info p { margin: 5px 0 0; font-size: 14px; color: rgba(255,255,255,0.8); }

        /* Premium Side Button */
        .side-btn {
            position: absolute;
            right: 20px;
            bottom: 150px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff;
            z-index: 20;
        }

        /* 3D O'girilish effekti (CSS orqali) */
        /* Bu qism skroll vaqtida video qanday harakatlanishini belgilaydi */
    </style>
</head>
<body>
    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = { databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const data = snap.val() || {};
            let videos = Object.entries(data).map(([id, item]) => ({ id, ...item })).reverse();
            renderVideos(videos);
        });

        function renderVideos(videos) {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            videos.forEach(item => {
                const div = document.createElement('div');
                div.className = 'reel';
                
                div.innerHTML = `
                    <div class="video-card" ondblclick="handleDoubleTap(this)">
                        <video id="vid-${item.id}" loop playsinline muted preload="none" data-src="${item.file_url}"></video>
                        <div class="overlay-info">
                            <h3 onclick="tg.openTelegramLink('${item.channel_link || '#'}')">💎 @${item.user}</h3>
                            <p>${item.caption || ''}</p>
                        </div>
                    </div>
                    <div class="side-btn" onclick="shareVideo('${item.id}', '${item.caption}')">✈️</div>
                `;
                container.appendChild(div);
            });
            initLazyLoad();
        }

        // 3D O'girilish effekti uchun Skroll nazorati
        document.getElementById('reels').addEventListener('scroll', function() {
            const reels = document.querySelectorAll('.reel');
            reels.forEach(reel => {
                const rect = reel.getBoundingClientRect();
                const offset = rect.top / window.innerHeight;
                
                // Orqaga qayrilish (Flip) hisob-kitobi
                const rotateX = offset * 40; // 40 darajagacha egiladi
                const scale = 1 - Math.abs(offset) * 0.2; // Biroz kichrayadi
                const opacity = 1 - Math.abs(offset) * 0.5; // Biroz xiralashadi
                
                const card = reel.querySelector('.video-card');
                if (card) {
                    card.style.transform = `rotateX(${rotateX}deg) scale(${scale})`;
                    card.style.opacity = opacity;
                }
            });
        });

        function initLazyLoad() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        if (!video.src) {
                            video.src = video.getAttribute('data-src');
                            video.load();
                        }
                        video.play();
                        video.muted = false;
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function shareVideo(id, text) {
            const url = `https://t.me/Vireels_bot?start=${id}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${url}&text=${encodeURIComponent(text)}`);
        }

        function handleDoubleTap(element) {
            const heart = document.createElement('div');
            heart.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;z-index:20;color:#fff;opacity:0;transition:0.4s;pointer-events:none;text-shadow:0 0 30px #0088cc;';
            heart.innerHTML = '💙';
            element.appendChild(heart);
            setTimeout(() => { heart.style.opacity='1'; heart.style.transform='translate(-50%,-50%) scale(1.3)'; }, 20);
            setTimeout(() => { heart.style.opacity='0'; heart.style.transform='translate(-50%,-50%) scale(1)'; }, 700);
            setTimeout(() => heart.remove(), 1000);
        }
    </script>
</body>
</html>
