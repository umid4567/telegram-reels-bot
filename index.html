<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #reels { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reel { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; bottom: 30px; left: 15px; z-index: 10; text-shadow: 0 2px 4px #000; }
    </style>
</head>
<body>
    <div id="reels"></div>
    <script>
        const firebaseConfig = {
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            const data = snap.val() || {};
            Object.entries(data).reverse().forEach(([id, item]) => {
                const div = document.createElement('div');
                div.className = 'reel';
                div.innerHTML = `
                    <video loop playsinline src="${item.file_url}"></video>
                    <div class="info"><h3>@${item.user}</h3><p>${item.caption || ''}</p></div>
                `;
                container.appendChild(div);
            });
            initObserver();
        });

        function initObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) v.play().catch(() => {});
                    else v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel').forEach(r => observer.observe(r));
        }
        document.body.onclick = () => document.querySelectorAll('video').forEach(v => v.muted = false);
    </script>
</body>
</html>
