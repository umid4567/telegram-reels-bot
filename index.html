<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels Fast</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #reels { 
            height: 100vh; 
            width: 100vw; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
        }
        #reels::-webkit-scrollbar { display: none; }
        .reel { 
            height: 100vh; width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .info {
            position: absolute; bottom: 40px; left: 15px; right: 15px;
            z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .status-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #888; }
    </style>
</head>
<body>

    <div id="reels">
        <div class="status-msg" id="status">Baza bilan aloqa o'rnatilmoqda...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const reelsContainer = document.getElementById('reels');
        const status = document.getElementById('status');

        database.ref('videos').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                status.innerHTML = "Hali videolar yo'q.";
                return;
            }

            reelsContainer.innerHTML = '';
            Object.values(data).reverse().forEach(item => {
                if (item.url && String(item.url).startsWith('http')) {
                    const reelDiv = document.createElement('div');
                    reelDiv.className = 'reel';
                    reelDiv.innerHTML = `
                        <video src="${item.url}" loop playsinline muted preload="metadata"></video>
                        <div class="info">
                            <h3>@${item.user || 'foydalanuvchi'}</h3>
                            <p>${item.caption || ''}</p>
                        </div>
                    `;
                    reelsContainer.appendChild(reelDiv);
                }
            });
            status.style.display = 'none';
            setupObserver(); // Aqlli yuklashni ishga tushirish
        });

        function setupObserver() {
            const options = { threshold: 0.6 }; // Video 60% ko'rinsa ishlaydi
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play();
                        video.setAttribute('preload', 'auto'); // Ko'rinayotgan videoni to'liq yuklash
                    } else {
                        video.pause();
                        // Video ko'rinmay qolsa, resursni tejash (ixtiyoriy)
                    }
                });
            }, options);

            document.querySelectorAll('video').forEach(v => observer.observe(v));
            
            // Ekran bosilganda ovozni ochish va play qilishni majburlash
            document.body.onclick = () => {
                const currentVideo = document.querySelector('.reel video:hover') || document.querySelectorAll('video')[0];
                if(currentVideo) {
                    currentVideo.muted = false;
                    currentVideo.play();
                }
            };
        }
    </script>
</body>
</html>
