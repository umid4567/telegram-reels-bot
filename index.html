<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .reel {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-info {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .video-info h3 { margin: 0; font-size: 16px; }
        .video-info p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="reels-container" id="reels">
        </div>

    <script>
        // 1. Firebase Sozlamalari
        const firebaseConfig = {
            apiKey: "AIzaSyAHiKEVfIPHiyYlIUjctyeXvnPgKuY4qRk",
            authDomain: "uzreels-bot.firebaseapp.com",
            databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "uzreels-bot",
            storageBucket: "uzreels-bot.firebasestorage.app",
            messagingSenderId: "548439537876",
            appId: "1:548439537876:web:385c3004c225501914a341"
        };

        // 2. Firebase-ni ishga tushirish
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 3. Bazadan videolarni olish
        const reelsContainer = document.getElementById('reels');
        const videosRef = database.ref('videos');

        videosRef.on('value', (snapshot) => {
            reelsContainer.innerHTML = ''; // Tozalash
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).reverse().forEach(item => {
                    // Faqat link bo'lsa ko'rsatadi (file_id ni brauzer o'qimaydi)
                    if (item.url.startsWith('http')) {
                        const reelDiv = document.createElement('div');
                        reelDiv.className = 'reel';
                        reelDiv.innerHTML = `
                            <video src="${item.url}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                            <div class="video-info">
                                <h3>@${item.user || 'foydalanuvchi'}</h3>
                                <p>${item.caption || ''}</p>
                            </div>
                        `;
                        reelsContainer.appendChild(reelDiv);
                    }
                });
            } else {
                reelsContainer.innerHTML = '<div style="padding: 20px; text-align: center;">Hali videolar yo'q.</div>';
            }
        });

        // Telegram WebApp sozlamasi
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
