<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzReels: Premium Sky</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        /* 1. Telegram Premium uslubidagi harakatlanuvchi osmon foni */
        body { 
            margin: 0; 
            height: 100vh;
            background: linear-gradient(-45deg, #0088cc, #4facfe, #00f2fe, #a8edea);
            background-size: 400% 400%;
            animation: skyGradient 15s ease infinite;
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }

        @keyframes skyGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        #reels { 
            display: flex;
            height: 100vh; 
            width: 100vw;
            overflow-x: scroll; 
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
            position: relative;
            z-index: 10;
        }
        #reels::-webkit-scrollbar { display: none; }
        
        .reel { 
            min-width: 100vw; 
            height: 100vh; 
            scroll-snap-align: start; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }

        .system-container {
            position: relative;
            width: 100%;
            height: 70%; 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        
        /* 2. Premium "Shimmer" (Yaltiroq) Ramka */
        .window-frame {
            position: relative;
            width: 85vw;
            height: 60vh;
            max-width: 380px;
            max-height: 550px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 40px rgba(0, 136, 204, 0.3);
            overflow: hidden;
        }

        /* Premium yaltirash effekti */
        .window-frame::before {
            content: '';
            position: absolute;
            top: -150%; left: -150%;
            width: 300%; height: 300%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            animation: premiumShine 4s infinite;
        }

        @keyframes premiumShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .video-wrapper {
            position: relative;
            width: 92%;
            height: 94%;
            border-radius: 140px;
            overflow: hidden;
            background: #000;
            z-index: 5;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* 3. Premium Info Panel */
        .info-bubble {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 15px 30px;
            width: 75%;
            margin-top: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .info-bubble h3 { 
            margin: 0; 
            font-size: 20px; 
            color: #fff; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .side-actions {
            position: absolute;
            bottom: 40px;
            right: 30px;
        }

        /* Premium Tugma */
        .action-btn {
            background: linear-gradient(45deg, #0088cc, #4facfe);
            border: 2px solid rgba(255,255,255,0.5);
            width: 65px; height: 65px;
            border-radius: 50%;
            font-size: 28px;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4);
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.9); }

    </style>
</head>
<body>
    <div id="reels"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = { databaseURL: "https://uzreels-bot-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const data = snap.val() || {};
            let videos = Object.entries(data).map(([id, item]) => ({ id, ...item })).reverse();
            renderVideos(videos);
        });

        function renderVideos(videos) {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            videos.forEach(item => {
                const div = document.createElement('div');
                div.className = 'reel';
                
                div.innerHTML = `
                    <div class="system-container">
                        <div class="window-frame">
                            <div class="video-wrapper" ondblclick="handleDoubleTap(this)">
                                <video id="vid-${item.id}" loop playsinline muted preload="none" data-src="${item.file_url}"></video>
                            </div>
                        </div>
                    </div>
                    <div class="info-bubble">
                        <h3 onclick="tg.openTelegramLink('${item.channel_link || '#'}')">💎 @${item.user}</h3>
                        <p>${item.caption || ''}</p>
                    </div>
                    <div class="side-actions">
                        <button class="action-btn" onclick="shareVideo('${item.id}', '${item.caption}')">✈️</button>
                    </div>
                `;
                container.appendChild(div);
            });
            initLazyLoad();
        }

        function initLazyLoad() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        if (!video.src) {
                            video.src = video.getAttribute('data-src');
                            video.load();
                        }
                        video.play();
                        video.muted = false;
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function shareVideo(id, text) {
            const url = `https://t.me/Vireels_bot?start=${id}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${url}&text=${encodeURIComponent(text)}`);
        }

        function handleDoubleTap(element) {
            const heart = document.createElement('div');
            heart.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:100px;z-index:20;color:#fff;opacity:0;transition:0.3s;pointer-events:none;text-shadow: 0 0 20px #0088cc;';
            heart.innerHTML = '💙';
            element.appendChild(heart);
            setTimeout(() => { heart.style.opacity='1'; heart.style.transform='translate(-50%,-50%) scale(1.3)'; }, 20);
            setTimeout(() => { heart.style.opacity='0'; heart.style.transform='translate(-50%,-50%) scale(1)'; }, 700);
            setTimeout(() => heart.remove(), 1000);
        }
    </script>
</body>
</html>
